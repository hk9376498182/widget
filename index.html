<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Widget Test — DoveSoft</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; }
    .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; text-align: center; padding: 40px 20px; }
    h1 { font-size: 2rem; font-weight: 700; color: #4f46e5; }
    p  { color: #64748b; font-size: 1.1rem; max-width: 480px; line-height: 1.6; }
    .badge { background: #ede9fe; color: #6d28d9; font-size: 0.8rem; font-weight: 600; padding: 6px 14px; border-radius: 99px; }
  </style>
</head>
<body>
  <div class="hero">
    <span class="badge">DoveSoft Widget Demo</span>
    <h1>Chat Widget Test</h1>
    <p>The chat bubble should appear in the <strong>bottom-right corner</strong>. Click it to open the widget.</p>
  </div>
  <script>
(function () {
  'use strict';
  const BOT_ID   = '1';
  const API_BASE = 'https://widget.dovesoft.ltd';

  let VISITOR_ID = localStorage.getItem('_ww_vid');
  if (!VISITOR_ID) { VISITOR_ID = 'ww_' + Math.random().toString(36).slice(2) + Date.now(); localStorage.setItem('_ww_vid', VISITOR_ID); }

  let CONFIG = null, SESSION_ID = null, CURRENT_TAB = 'chat', PRE_CHAT_DONE = false, EXISTING_MSGS = [];

  const api  = (path, opts = {}) => fetch(API_BASE + '/w/' + BOT_ID + path, { headers: { 'Content-Type': 'application/json' }, ...opts }).then(r => r.json());
  const post = (path, body) => api(path, { method: 'POST', body: JSON.stringify(body) });
  const debounce = (fn, ms) => { let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); }; };

  const injectStyles = (color) => {
    if (document.getElementById('_ww_styles')) return;
    const s = document.createElement('style');
    s.id = '_ww_styles';
    s.textContent = ':root{--ww-c:' + (color||'#4f46e5') + '}'
      + '#_ww_bubble{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--ww-c);box-shadow:0 4px 20px rgba(0,0,0,.25);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2147483640;transition:transform .2s;border:none}'
      + '#_ww_bubble:hover{transform:scale(1.08)}'
      + '#_ww_bubble svg{width:26px;height:26px;fill:#fff}'
      + '#_ww_panel{position:fixed;bottom:90px;right:24px;width:380px;max-height:600px;border-radius:16px;background:#fff;box-shadow:0 8px 40px rgba(0,0,0,.18);z-index:2147483639;display:none;flex-direction:column;overflow:hidden;font-family:-apple-system,sans-serif;font-size:14px}'
      + '#_ww_panel.open{display:flex}'
      + '._ww_header{background:var(--ww-c);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px}'
      + '._ww_header .ttl{font-weight:600;font-size:15px}'
      + '._ww_header .sub{font-size:12px;opacity:.85}'
      + '._ww_header .cls{margin-left:auto;background:transparent;border:none;color:#fff;cursor:pointer;opacity:.8;font-size:18px;line-height:1}'
      + '._ww_tabs{display:flex;border-bottom:1px solid #e5e7eb}'
      + '._ww_tab{flex:1;padding:10px;text-align:center;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:#6b7280;border-bottom:2px solid transparent;transition:all .15s}'
      + '._ww_tab.active{color:var(--ww-c);border-bottom-color:var(--ww-c)}'
      + '._ww_body{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}'
      + '._ww_prechat{padding:20px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}'
      + '._ww_prechat h3{margin:0 0 4px;font-size:15px;color:#111}'
      + '._ww_prechat p{margin:0;color:#6b7280;font-size:13px}'
      + '._ww_inp{width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;box-sizing:border-box;outline:none}'
      + '._ww_inp:focus{border-color:var(--ww-c)}'
      + '._ww_btn{background:var(--ww-c);color:#fff;border:none;border-radius:8px;padding:10px 18px;cursor:pointer;font-size:13px;font-weight:600}'
      + '._ww_msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}'
      + '._ww_msg{max-width:80%;padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.5;word-break:break-word}'
      + '._ww_msg.out{align-self:flex-end;background:var(--ww-c);color:#fff;border-bottom-right-radius:4px}'
      + '._ww_msg.in{align-self:flex-start;background:#f3f4f6;color:#111;border-bottom-left-radius:4px}'
      + '._ww_msg.in .sender{font-size:11px;font-weight:600;color:var(--ww-c);margin-bottom:3px}'
      + '._ww_typing{align-self:flex-start;background:#f3f4f6;padding:9px 14px;border-radius:12px}'
      + '._ww_typing span{display:inline-block;width:6px;height:6px;background:#9ca3af;border-radius:50%;animation:_wwbounce 1.2s infinite ease-in-out;margin:0 1px}'
      + '._ww_typing span:nth-child(2){animation-delay:.2s}'
      + '._ww_typing span:nth-child(3){animation-delay:.4s}'
      + '@keyframes _wwbounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}'
      + '._ww_chatbar{padding:10px 12px;border-top:1px solid #e5e7eb;display:flex;gap:8px}'
      + '._ww_chatbar input{flex:1;padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;outline:none}'
      + '._ww_chatbar button{background:var(--ww-c);border:none;border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer}'
      + '._ww_chatbar button svg{width:18px;height:18px;fill:#fff}'
      + '._ww_btns{display:flex;flex-direction:column;gap:6px;margin-top:6px}'
      + '._ww_ibtn{background:#fff;border:1.5px solid var(--ww-c);color:var(--ww-c);border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px;text-align:left}'
      + '._ww_ibtn:hover{background:var(--ww-c);color:#fff}'
      + '._ww_kb{flex:1;overflow-y:auto;display:flex;flex-direction:column}'
      + '._ww_kbsearch{padding:10px 12px;border-bottom:1px solid #e5e7eb;position:relative}'
      + '._ww_kbsearch input{width:100%;padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;outline:none;box-sizing:border-box}'
      + '._ww_suggest{position:absolute;left:12px;right:12px;top:calc(100% - 4px);background:#fff;border:1px solid #e5e7eb;border-radius:8px;z-index:10;box-shadow:0 4px 16px rgba(0,0,0,.1);overflow:hidden}'
      + '._ww_sitem{padding:9px 12px;cursor:pointer;font-size:13px;display:flex;flex-direction:column;border-bottom:1px solid #f3f4f6}'
      + '._ww_sitem:hover{background:#f9fafb}'
      + '._ww_sitem .stitle{font-weight:500;color:#111}'
      + '._ww_sitem .sexcerpt{color:#6b7280;font-size:12px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}'
      + '._ww_topiclist{flex:1;overflow-y:auto;padding:10px 12px}'
      + '._ww_topiccard{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}'
      + '._ww_topiccard:hover{border-color:var(--ww-c)}'
      + '._ww_topiccard .tc_title{font-weight:600;font-size:13px;color:#111}'
      + '._ww_topiccard .tc_cat{font-size:11px;color:var(--ww-c);margin-top:3px}'
      + '._ww_topiccard .tc_exc{font-size:12px;color:#6b7280;margin-top:4px}'
      + '._ww_topicview{flex:1;overflow-y:auto;padding:14px}'
      + '._ww_topicview .tv_back{background:none;border:none;color:var(--ww-c);cursor:pointer;font-size:13px;padding:0 0 10px;display:flex;align-items:center;gap:4px}'
      + '._ww_topicview .tv_title{font-size:16px;font-weight:700;color:#111;margin-bottom:10px}'
      + '._ww_topicview .tv_body{font-size:13px;color:#374151;line-height:1.7}';
    document.head.appendChild(s);
  };

  const buildDOM = () => {
    const bubble = document.createElement('button');
    bubble.id = '_ww_bubble';
    bubble.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.82.49 3.53 1.34 5L2 22l5.21-1.33C8.55 21.54 10.22 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm0 18c-1.7 0-3.29-.45-4.67-1.24l-.33-.2-3.09.79.82-3-.21-.34C3.46 14.79 3 13.45 3 12c0-4.97 4.03-9 9-9s9 4.03 9 9-4.03 9-9 9z"/></svg>';
    document.body.appendChild(bubble);
    const panel = document.createElement('div');
    panel.id = '_ww_panel';
    document.body.appendChild(panel);
    bubble.onclick = () => panel.classList.toggle('open');
    return { bubble, panel };
  };

  const renderPanel = (panel) => {
    const c = CONFIG;
    const avatar = c.widget_avatar_url ? '<img src="' + c.widget_avatar_url + '" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">' : '';
    const sub    = c.widget_subtitle   ? '<div class="sub">' + c.widget_subtitle + '</div>' : '';
    const tabs   = (c.kb_enabled && c.chat_enabled)
      ? '<div class="_ww_tabs">'
        + '<button class="_ww_tab ' + (c.default_tab === 'chat'   ? 'active' : '') + '" data-tab="chat">&#x1F4AC; Chat</button>'
        + '<button class="_ww_tab ' + (c.default_tab === 'topics' ? 'active' : '') + '" data-tab="topics">&#x1F4DA; Topics</button>'
        + '</div>' : '';
    panel.innerHTML = '<div class="_ww_header">' + avatar + '<div><div class="ttl">' + c.widget_title + '</div>' + sub + '</div>'
      + '<button class="cls" onclick="document.getElementById(\'_ww_panel\').classList.remove(\'open\')">&#x2715;</button></div>'
      + tabs + '<div class="_ww_body" id="_ww_body"></div>';
    CURRENT_TAB = c.default_tab || 'chat';
    panel.querySelectorAll('._ww_tab').forEach(btn => {
      btn.onclick = () => {
        panel.querySelectorAll('._ww_tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); CURRENT_TAB = btn.dataset.tab; renderBody();
      };
    });
    renderBody();
  };

  const renderBody = () => {
    const body = document.getElementById('_ww_body');
    if (!body) return;
    if (CURRENT_TAB === 'topics') { renderKB(body); return; }
    if (CONFIG.require_visitor_info && !PRE_CHAT_DONE) { renderPreChat(body); return; }
    renderChat(body);
  };

  const renderPreChat = (body) => {
    body.innerHTML = '<div class="_ww_prechat"><h3>' + (CONFIG.prechat_title || 'Before we begin...') + '</h3>'
      + '<p>Please enter your details to start chatting.</p>'
      + '<input class="_ww_inp" id="_ww_name" type="text" placeholder="Your name"/>'
      + '<input class="_ww_inp" id="_ww_email" type="email" placeholder="Email address"/>'
      + '<input class="_ww_inp" id="_ww_mobile" type="tel" placeholder="Mobile number"/>'
      + '<button class="_ww_btn" id="_ww_startbtn">Start Chat &#x2192;</button>'
      + '<div id="_ww_preerr" style="color:#ef4444;font-size:12px;display:none"></div></div>';
    document.getElementById('_ww_startbtn').onclick = async () => {
      const name   = document.getElementById('_ww_name').value.trim();
      const email  = document.getElementById('_ww_email').value.trim();
      const mobile = document.getElementById('_ww_mobile').value.trim();
      const err    = document.getElementById('_ww_preerr');
      if (!mobile) { err.textContent = 'Mobile number is required'; err.style.display = ''; return; }
      err.style.display = 'none';
      try {
        const r = await post('/session', { visitor_id: VISITOR_ID, visitor_name: name, visitor_email: email, visitor_mobile: mobile, origin_url: location.href, referrer: document.referrer });
        SESSION_ID = r.session_id; PRE_CHAT_DONE = true; EXISTING_MSGS = r.messages || [];
        renderChat(document.getElementById('_ww_body'));
      } catch { err.textContent = 'Could not start session.'; err.style.display = ''; }
    };
  };

  const renderChat = (body) => {
    body.innerHTML = '<div class="_ww_msgs" id="_ww_msgs"></div>'
      + '<div class="_ww_chatbar"><input id="_ww_input" type="text" placeholder="Type a message..."/>'
      + '<button id="_ww_send"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button></div>';
    EXISTING_MSGS.forEach(m => appendMessage(m.direction === 'inbound' ? 'out' : 'in', m.content));
    const input = document.getElementById('_ww_input');
    const send  = document.getElementById('_ww_send');
    const doSend = async () => {
      const text = input.value.trim(); if (!text) return; input.value = '';
      appendMessage('out', text); const typing = appendTyping();
      try {
        const r = await post('/chat', { session_id: SESSION_ID, message: text, visitor_id: VISITOR_ID });
        typing.remove(); renderBotReply(r.reply);
      } catch { typing.remove(); appendMessage('in', CONFIG.fallback_message || "Sorry, couldn't process that."); }
    };
    send.onclick = doSend;
    input.onkeydown = e => { if (e.key === 'Enter') doSend(); };
  };

  const appendMessage = (dir, text) => {
    const msgs = document.getElementById('_ww_msgs'); if (!msgs) return null;
    const el = document.createElement('div'); el.className = '_ww_msg ' + dir;
    if (dir === 'in') el.innerHTML = '<div class="sender">' + (CONFIG.agent_name || 'Bot') + '</div>';
    el.innerHTML += (text || '').replace(/\n/g, '<br>');
    msgs.appendChild(el); msgs.scrollTop = msgs.scrollHeight; return el;
  };

  const appendTyping = () => {
    const msgs = document.getElementById('_ww_msgs');
    const el = document.createElement('div'); el.className = '_ww_typing';
    el.innerHTML = '<span></span><span></span><span></span>';
    msgs && msgs.appendChild(el); msgs && msgs.scrollTo({ top: msgs.scrollHeight, behavior: 'smooth' });
    return el;
  };

  const renderBotReply = (reply) => {
    if (!reply) return;
    if (reply.type === 'text' || !reply.type) { appendMessage('in', reply.content); return; }
    const msgs = document.getElementById('_ww_msgs'); if (!msgs) return;
    const c = reply.content || {};
    const el = document.createElement('div'); el.className = '_ww_msg in';
    const sender = '<div class="sender">' + (CONFIG.agent_name || 'Bot') + '</div>';
    if (reply.type === 'buttons') {
      el.innerHTML = sender + (c.body || '') + '<div class="_ww_btns">' + (c.buttons || []).map(b => '<button class="_ww_ibtn">' + b.title + '</button>').join('') + '</div>';
    } else if (reply.type === 'list') {
      const rows = (c.sections || []).flatMap(s => s.rows || []);
      el.innerHTML = sender + (c.body || '') + '<div class="_ww_btns">' + rows.map(r => '<button class="_ww_ibtn">' + r.title + '</button>').join('') + '</div>';
    }
    msgs.appendChild(el);
    el.querySelectorAll('._ww_ibtn').forEach(btn => {
      btn.onclick = () => { const inp = document.getElementById('_ww_input'); if (inp) inp.value = btn.textContent; document.getElementById('_ww_send') && document.getElementById('_ww_send').click(); };
    });
    msgs.scrollTop = msgs.scrollHeight;
  };

  let KB_TOPICS = [];
  const renderKB = async (body) => {
    body.innerHTML = '<div class="_ww_kb"><div class="_ww_kbsearch"><input id="_ww_kbq" type="text" placeholder="Search topics..." autocomplete="off"/><div id="_ww_suggest" class="_ww_suggest" style="display:none"></div></div><div class="_ww_topiclist" id="_ww_topiclist"><div style="padding:20px;text-align:center;color:#9ca3af">Loading...</div></div></div>';
    if (!KB_TOPICS.length) KB_TOPICS = await api('/kb/topics');
    renderTopicList(KB_TOPICS);
    const si = document.getElementById('_ww_kbq');
    const sg = document.getElementById('_ww_suggest');
    const doSearch = debounce(async (q) => {
      if (!q) { sg.style.display = 'none'; renderTopicList(KB_TOPICS); return; }
      const res = await api('/kb/search?q=' + encodeURIComponent(q) + '&visitor_id=' + VISITOR_ID);
      renderTopicList(res);
      if (!res.length) { sg.style.display = 'none'; return; }
      sg.innerHTML = res.map(t => '<div class="_ww_sitem" data-id="' + t.id + '"><div class="stitle">' + t.title + '</div>' + (t.excerpt ? '<div class="sexcerpt">' + t.excerpt + '</div>' : '') + '</div>').join('');
      sg.style.display = '';
      sg.querySelectorAll('._ww_sitem').forEach(item => { item.onclick = () => { sg.style.display = 'none'; openTopic(item.dataset.id); }; });
    }, 280);
    si && si.addEventListener('input', e => doSearch(e.target.value.trim()));
    document.addEventListener('click', e => { if (sg && !sg.contains(e.target) && e.target !== si) sg.style.display = 'none'; });
  };

  const renderTopicList = (topics) => {
    const list = document.getElementById('_ww_topiclist'); if (!list) return;
    if (!topics.length) { list.innerHTML = '<div style="padding:20px;text-align:center;color:#9ca3af">No topics found.</div>'; return; }
    const groups = {};
    topics.forEach(t => { const cat = t.category || 'General'; (groups[cat] = groups[cat] || []).push(t); });
    list.innerHTML = Object.entries(groups).map(([cat, items]) =>
      '<div style="font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;margin:10px 0 6px">' + cat + '</div>'
      + items.map(t => '<div class="_ww_topiccard" data-id="' + t.id + '"><div class="tc_title">' + t.title + '</div>'
        + (t.category ? '<div class="tc_cat">' + t.category + '</div>' : '')
        + (t.excerpt  ? '<div class="tc_exc">'  + t.excerpt  + '</div>' : '') + '</div>').join('')
    ).join('');
    list.querySelectorAll('._ww_topiccard').forEach(c => { c.onclick = () => openTopic(c.dataset.id); });
  };

  const openTopic = async (topicId) => {
    const body = document.getElementById('_ww_body'); if (!body) return;
    body.innerHTML = '<div style="padding:20px;color:#9ca3af">Loading...</div>';
    const topic = await api('/kb/topic/' + topicId);
    body.innerHTML = '<div class="_ww_topicview"><button class="tv_back" id="_ww_back">&#x2190; Back</button>'
      + '<div class="tv_title">' + topic.title + '</div>'
      + '<div class="tv_body">' + topic.content.replace(/\n/g, '<br>') + '</div></div>';
    document.getElementById('_ww_back').onclick = () => renderBody();
  };

  const init = async () => {
    console.log('[WebWidget] Initialising — BOT_ID:', BOT_ID, '| API:', API_BASE);
    try {
      CONFIG = await api('/config');
      injectStyles(CONFIG.widget_color);
      const { panel } = buildDOM();
      renderPanel(panel);
      if (!CONFIG.require_visitor_info && CONFIG.chat_enabled) {
        const r = await post('/session', { visitor_id: VISITOR_ID, origin_url: location.href, referrer: document.referrer });
        SESSION_ID = r.session_id; PRE_CHAT_DONE = true; EXISTING_MSGS = r.messages || [];
      }
    } catch (e) { console.error('[WebWidget] Init failed:', e.message || e); }
  };

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
  </script>
</body>
</html>
